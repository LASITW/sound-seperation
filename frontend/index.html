<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Separation</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="8" fill="#7c3aed"/>
          <path d="M6 14 Q10 6 14 14 Q18 22 22 14" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        </svg>
        <span>Sound Separation</span>
      </div>
      <p class="subtitle">Isolate vocals, drums, bass and more from any audio file</p>
    </div>
  </header>

  <main>
    <!-- Step 1: Upload -->
    <section id="upload-section" class="card">
      <h2 class="step-label"><span class="step-num">1</span> Upload Audio</h2>
      <div id="drop-zone" role="button" tabindex="0" aria-label="Upload audio file">
        <svg id="drop-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <path d="M20 8v16M12 16l8-8 8 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 30h24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <p id="drop-primary">Drag &amp; drop your audio file here</p>
        <p id="drop-secondary">or <button id="browse-btn" type="button">browse files</button></p>
        <p id="drop-formats">WAV · MP3 · FLAC &nbsp;·&nbsp; max 100 MB</p>
        <input type="file" id="file-input" accept=".wav,.mp3,.flac,audio/wav,audio/mpeg,audio/flac" hidden />
      </div>
      <div id="file-info" hidden>
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M5 2h8l5 5v11a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.6"/>
          <path d="M13 2v5h5" stroke="currentColor" stroke-width="1.6"/>
        </svg>
        <span id="file-name"></span>
        <span id="file-size" class="muted"></span>
        <button id="clear-file-btn" type="button" aria-label="Remove file">&times;</button>
      </div>
    </section>

    <!-- Step 2: Select targets -->
    <section id="targets-section" class="card">
      <h2 class="step-label"><span class="step-num">2</span> Choose What to Extract</h2>
      <div class="target-grid">
        <button class="target-card" data-target="vocals" type="button">
          <span class="target-icon" aria-hidden="true">🎤</span>
          <span class="target-name">Vocals</span>
          <span class="target-desc">Singing &amp; speech</span>
          <span class="check-mark" aria-hidden="true">✓</span>
        </button>
        <button class="target-card" data-target="drums" type="button">
          <span class="target-icon" aria-hidden="true">🥁</span>
          <span class="target-name">Drums</span>
          <span class="target-desc">Percussion &amp; beats</span>
          <span class="check-mark" aria-hidden="true">✓</span>
        </button>
        <button class="target-card" data-target="bass" type="button">
          <span class="target-icon" aria-hidden="true">🎸</span>
          <span class="target-name">Bass</span>
          <span class="target-desc">Low-frequency bass</span>
          <span class="check-mark" aria-hidden="true">✓</span>
        </button>
        <button class="target-card" data-target="other" type="button">
          <span class="target-icon" aria-hidden="true">🎹</span>
          <span class="target-name">Other</span>
          <span class="target-desc">Keys, strings &amp; more</span>
          <span class="check-mark" aria-hidden="true">✓</span>
        </button>
      </div>
    </section>

    <!-- Step 3: Action -->
    <section id="action-section">
      <div id="error-banner" hidden role="alert">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.6"/>
          <path d="M10 6v5M10 14v.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span id="error-message"></span>
        <button id="error-dismiss" type="button" aria-label="Dismiss">&times;</button>
      </div>
      <button id="separate-btn" type="button" disabled>
        <span id="btn-label">Separate</span>
        <span id="btn-spinner" hidden aria-hidden="true" class="spinner"></span>
      </button>
    </section>

    <!-- Progress -->
    <section id="progress-section" hidden>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill" style="width:0%"></div>
      </div>
      <p id="progress-label">Preparing...</p>
    </section>

    <!-- Results -->
    <section id="results-section" hidden>
      <div class="results-header">
        <h2>Results</h2>
        <button id="reset-btn" type="button">Separate Another</button>
      </div>
      <div id="results-grid"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
